services:
  # PostgreSql Database
  postgres:
    image: postgres:15-alpine
    container_name: cloud_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network

  # MinIO (S3 Compatible Storage) with SSE Encryption
  minio:
    image: minio/minio
    container_name: cloud_minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:9000}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
      # MinIO SSE Encryption (AES-256 at rest)
      MINIO_SSE_KMS_KES_ENDPOINT: ""
      MINIO_SSE_KMS_KES_KEY_NAME: ""
      MINIO_SSE_KMS_KES_CERT_FILE: ""
      MINIO_SSE_KMS_KES_KEY_FILE: ""
      MINIO_SSE_KMS_KES_CA_FILE: ""
      # Use MinIO's built-in encryption key (for development/testing)
      MINIO_SSE_MASTER_KEY: "my-minio-encryption-key-32bytes!!"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000" # API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Console
    networks:
      - cloud-network

  # Backend API (Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud_backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT}
      MINIO_EXTERNAL_PORT: ${MINIO_EXTERNAL_PORT}
      MINIO_EXTERNAL_USE_SSL: ${MINIO_EXTERNAL_USE_SSL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cloud-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: cloud_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-9090}:3000"
    networks:
      - cloud-network

volumes:
  pgdata:
  minio_data:

networks:
  cloud-network:
    driver: bridge